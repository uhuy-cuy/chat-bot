<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <title>AI Chat</title>

    <style>
        /* --- semua style sama seperti milikmu --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
        }

        .chat-container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 15px;
            border-bottom: 1px solid #1e293b;
            display: flex;
            align-items: center;
            gap: 10px;
            background: #020617;
        }

        .status {
            width: 10px;
            height: 10px;
            background: #22c55e;
            border-radius: 50%;
        }

        .header h1 {
            font-size: 15px;
            color: #e2e8f0;
        }

        .messages {
            flex: 1;
            padding: 20px;
            padding-bottom: 120px;
            overflow-y: auto;
        }

        .msg-wrap {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            margin: 10px 0;
        }

        .user-wrap {
            justify-content: flex-end;
        }

        .msg {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.5;
            animation: fadeIn 0.2s ease;
            white-space: pre-wrap;
        }

        .user {
            background: linear-gradient(135deg, #3b82f6, #06b6d4);
            color: white;
        }

        .bot {
            background: #1e293b;
            color: #e2e8f0;
            animation: fadeInUp 0.3s ease;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #334155;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .input-area {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 600px;
            display: flex;
            gap: 10px;
            padding: 10px;
            border-radius: 15px;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid #1e293b;
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: none;
            outline: none;
            background: #020617;
            color: white;
        }

        button {
            background: linear-gradient(135deg, #3b82f6, #06b6d4);
            border: none;
            color: white;
            padding: 12px 16px;
            border-radius: 10px;
            cursor: pointer;
        }

        .footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            text-align: center;
            font-size: 11px;
            color: #64748b;
            background: #020617;
            padding: 3px;
        }

        .messages::-webkit-scrollbar {
            width: 5px;
        }

        .messages::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 10px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .msg code {
            background: #020617;
            padding: 3px 6px;
            border-radius: 6px;
            font-family: monospace;
            color: #38bdf8;
        }

        .msg pre {
            background: #020617;
            padding: 10px;
            border-radius: 10px;
            overflow-x: auto;
            margin-top: 8px;
            font-size: 13px;
            color: #38bdf8;
        }

        .msg pre code {
            font-family: 'Fira Code', monospace;
        }

        .msg ul {
            padding-left: 18px;
            margin-top: 5px;
        }

        .msg li {
            margin: 4px 0;
        }

        @media (min-width:600px) {
            .footer {
                max-width: 600px;
                left: 50%;
                transform: translateX(-50%);
            }
        }
    </style>
</head>

<body>
    <div class="chat-container">
        <div class="header">
            <div class="status"></div>
            <h1>AI tahirwiyan_</h1>
        </div>
        <div class="messages" id="messages"></div>
    </div>

    <div class="input-area">
        <input id="input" placeholder="Ketik pesan..." onkeydown="if(event.key==='Enter') send()">
        <button onclick="send()">Kirim</button>
    </div>

    <div class="footer">
        created by <b>tahirwiyan_</b>
    </div>

    <script>
        function formatText(text) {
            text = text.replace(/</g, "&lt;").replace(/>/g, "&gt;");
            let codeBlocks = [], codeLangs = [];
            text = text.replace(/```(\w+)?\n?([\s\S]*?)```/g, function (m, lang, code) { codeBlocks.push(code); codeLangs.push(lang || "plaintext"); return `__CODEBLOCK_${codeBlocks.length - 1}__`; });
            text = text.replace(/`(.*?)`/g, '<code>$1</code>');
            text = text.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
            text = text.replace(/\*(.*?)\*/g, '<i>$1</i>');
            text = text.replace(/(?:^|\n)[-*] (.*)/g, '<li>$1</li>');
            text = text.replace(/(<li>.*<\/li>)/g, '<ul>$1</ul>');
            text = text.replace(/\n/g, "<br>");
            text = text.replace(/__CODEBLOCK_(\d+)__/g, function (m, i) { return `<pre><code class="hljs">${codeBlocks[i]}</code></pre>`; });
            return text;
        }

        async function send() {
            const input = document.getElementById("input");
            const messages = document.getElementById("messages");
            const text = input.value.trim();
            if (!text) return;

            messages.innerHTML += `
    <div class="msg-wrap user-wrap">
        <div class="msg user">${text}</div>
        <div class="avatar">🧑</div>
    </div>`;
            input.value = "";

            const id = "load-" + Date.now();
            messages.innerHTML += `
    <div class="msg-wrap">
        <div class="avatar">🤖</div>
        <div class="msg bot" id="${id}">Mengetik...</div>
    </div>`;
            scrollBottom();

            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer 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"
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            { role: "system", content: "Kamu adalah AI yang santai, pintar, dan suka membantu." },
                            { role: "user", content: text }
                        ],
                        temperature: 0.7
                    })
                });

                const data = await res.json();
                const el = document.getElementById(id);
                const raw = data.choices?.[0]?.message?.content || "Maaf, tidak ada balasan 😢";
                const isCode = raw.includes("```");

                if (isCode) {
                    let i = 0;
                    el.innerHTML = "";
                    function typingCode() {
                        if (i < raw.length) { el.innerText = raw.slice(0, i); i++; setTimeout(typingCode, 5); }
                        else { el.innerHTML = formatText(raw); hljs.highlightAll(); }
                    }
                    typingCode();
                } else {
                    let i = 0;
                    el.innerHTML = "";
                    function typing() {
                        if (i < raw.length) { el.innerText = raw.slice(0, i); i++; setTimeout(typing, 10); }
                        else { el.innerHTML = formatText(raw); }
                    }
                    typing();
                }
            } catch (err) {
                console.error(err);
                document.getElementById(id).innerHTML = "Error 😢";
            }

            scrollBottom();
        }

        function scrollBottom() {
            const messages = document.getElementById("messages");
            messages.scrollTo({ top: messages.scrollHeight, behavior: "smooth" });
        }
    </script>

</body>

</html>
